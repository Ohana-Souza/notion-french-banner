<!DOCTYPE html>
<html>
<head>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #191919;
  overflow: hidden;
}

.banner {
  height: 90px;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: #191919;
}

.track {
  display: flex;
  gap: 56px;
  white-space: nowrap;
  animation: scroll 20s linear infinite;
}

.item {
  font-family: Georgia, serif;
  font-size: 42px;
  color: white;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
</style>
</head>

<body>
  <div class="banner">
    <div class="track">
      <span class="item">🥐 Bonjour</span>
      <span class="item">🗼 Paris</span>
      <span class="item">☕ Café</span>
      <span class="item">🥖 Baguette</span>
      <span class="item">🇫🇷 Français</span>
      <span class="item">🧀 Fromage</span>

      <span class="item">🥐 Bonjour</span>
      <span class="item">🗼 Paris</span>
      <span class="item">☕ Café</span>
      <span class="item">🥖 Baguette</span>
      <span class="item">🇫🇷 Français</span>
      <span class="item">🧀 Fromage</span>
    </div>
  </div>
</body>
</html>
